<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Products</title>
  </head>
  <body>
    <div class="page-layout">
      <header class="header">
        <div class="title">
          <h3>DASHBOARD</h3>
        </div>
      </header>

      <aside class="aside"></aside>

      <!-- Start Of MAIN CONTENT -->
      <main class="main">
        <div class="dash-board">
          
					<div class="total-products">
            <span>Total products:</span>
            <br />
            <button id="total-products-displayer">0</button>
          </div>

          <div class="sales">
            <span>Projected sales:</span>
            <br />
            <button id="sales-displayer">0</button>
          </div>
         
					<div class="total-capital">
            <span>Capital remaining:</span>
            <br />
            <button id="total-capital-displayer">0</button>
          </div>

          <div class="total-profit">
            <span>Projected profit</span>
            <br />
            <button id="total-profit-displayer">0</button>
          </div>
					
        </div>
      </main>
      <!-- End Of Main Content -->
    </div>
    <script src="./index.js" type="module"></script>
  </body>
</html>
